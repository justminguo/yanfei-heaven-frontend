<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}妍菲天堂資料查詢{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="{{ url_for('home') }}">妍菲天堂資料查詢</a>
      <nav class="nav">
        <div class="dropdown">
          <span class="dropdown-toggle">榮耀榜</span>
          <div class="dropdown-menu">
            <a href="{{ url_for('ranking') }}">排行</a>
            <a href="{{ url_for('rebirth') }}">轉生</a>
          </div>
        </div>
        <div class="dropdown">
          <span class="dropdown-toggle">遊戲百科</span>
          <div class="dropdown-menu">
            <a href="{{ url_for('items') }}">物品</a>
            <a href="{{ url_for('weapons') }}">武器</a>
            <a href="{{ url_for('armors') }}">防具</a>
            <a href="{{ url_for('monsters') }}">怪物</a>
            <a href="{{ url_for('drops') }}">掉落</a>
          </div>
        </div>
        <div class="dropdown">
          <span class="dropdown-toggle">幻化系統</span>
          <div class="dropdown-menu">
            <a href="{{ url_for('polymorphs') }}">變身</a>
            <a href="{{ url_for('dolls') }}">娃娃</a>
            <a href="{{ url_for('card_album') }}">卡冊</a>
            <a href="{{ url_for('synthesis') }}">合成</a>
          </div>
        </div>
        <div class="dropdown">
          <span class="dropdown-toggle">活動系統</span>
          <div class="dropdown-menu">
            <a href="{{ url_for('lottery') }}">抽獎</a>
            <a href="{{ url_for('equipment_redeem') }}">裝備贖回</a>
            <a href="{{ url_for('daily_hunt') }}">每日狩獵</a>
          </div>
        </div>
        <div class="dropdown">
          <span class="dropdown-toggle">成長系統</span>
          <div class="dropdown-menu">
            <a href="{{ url_for('tattoo') }}">紋樣</a>
          </div>
        </div>
      </nav>
    </div>
  </header>
  <main class="container page">
    {% block content %}{% endblock %}
  </main>
<script>
(function(){
  // ── Mobile dropdown toggle ─────────────────────────────────────
  document.querySelectorAll('.dropdown-toggle').forEach(function(toggle){
    toggle.addEventListener('click', function(e){
      if(window.innerWidth <= 768){
        e.preventDefault();
        var dd = toggle.closest('.dropdown');
        dd.classList.toggle('open');
      }
    });
  });

  // ── Sortable tables ──────────────────────────────────────────────
  document.querySelectorAll('table[data-sortable]').forEach(function(table){
    table.querySelectorAll('thead th').forEach(function(th, colIdx){
      th.setAttribute('data-sort','');
      th.addEventListener('click', function(){
        var tbody = table.querySelector('tbody');
        var rows  = Array.from(tbody.querySelectorAll('tr'));
        var asc   = !th.classList.contains('sort-asc');
        table.querySelectorAll('thead th').forEach(function(h){ h.classList.remove('sort-asc','sort-desc'); });
        rows.sort(function(a,b){
          var at = (a.cells[colIdx]||{}).textContent||'';
          var bt = (b.cells[colIdx]||{}).textContent||'';
          var an = parseFloat(at.replace(/,/g,''));
          var bn = parseFloat(bt.replace(/,/g,''));
          if(!isNaN(an)&&!isNaN(bn)) return asc ? an-bn : bn-an;
          return asc ? at.localeCompare(bt,'zh') : bt.localeCompare(at,'zh');
        });
        th.classList.add(asc ? 'sort-asc' : 'sort-desc');
        rows.forEach(function(r){ tbody.appendChild(r); });
      });
    });
  });

  // ── Live search ──────────────────────────────────────────────────
  document.querySelectorAll('input[data-live-search]').forEach(function(input){
    var table = document.querySelector(input.getAttribute('data-live-search'));
    if(!table) return;
    input.addEventListener('input', function(){
      var q = input.value.toLowerCase();
      table.querySelectorAll('tbody tr').forEach(function(row){
        row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    });
  });
})();
</script>
</body>
</html>
