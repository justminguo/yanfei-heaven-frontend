{% extends 'base.html' %}
{% block title %}防具查詢{% endblock %}
{% block content %}
<section class="card">
  <h1>防具查詢</h1>
  <form class="filters" method="get">
    <input type="text" name="q" placeholder="輸入防具名稱 / 名稱 ID"
           value="{{ q }}" data-live-search="#armors-table">
    <select name="type">
      <option value="">全部類型</option>
      {% for t in types %}
      <option value="{{ t.type }}" {% if a_type == t.type %}selected{% endif %}>{{ t.type }}</option>
      {% endfor %}
    </select>
    <button type="submit">查詢</button>
  </form>
  <div class="table-wrap">
    <table id="armors-table" data-sortable>
      <thead><tr><th>ID</th><th>名稱</th><th>類型</th><th>AC</th><th>安全強化</th><th>材質</th></tr></thead>
      <tbody>
      {% for row in rows %}
        <tr>
          <td>{{ row.id }}</td>
          <td>{{ row.name }}</td>
          <td>{{ row.type }}</td>
          <td>{{ row.ac }}</td>
          <td>{{ row.safenchant }}</td>
          <td>{{ row.material | material_cn }}</td>

        </tr>
      {% else %}
        <tr><td colspan="6">查無資料</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
