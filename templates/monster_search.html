{% extends 'base.html' %}
{% block title %}怪物查詢{% endblock %}
{% block content %}
<section class="card">
  <h1>怪物查詢</h1>
  <form class="filters" method="get">
    <input type="text" name="q" placeholder="搜尋怪物名稱…" value="{{ q }}">
    <button type="submit">查詢</button>
  </form>
  {% if q %}
  <div class="table-wrap">
    <table data-sortable>
      <thead><tr><th>名稱</th><th>等級</th><th>掉落數量</th></tr></thead>
      <tbody>
      {% for m in results %}
        <tr>
          <td><a href="{{ url_for('monster_detail', monster_id=m.id) }}">{{ m.name | clean_name }}</a></td>
          <td>{{ m.level }}</td>
          <td>{{ m.drops | length }}</td>
        </tr>
      {% else %}
        <tr><td colspan="3">查無資料</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
  {% endif %}
</section>
{% endblock %}
